<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋スーパー最安値トラッカー</title>
    <style>
        /* 기존 CSS 유지 + 강조 효과 추가 */
        body { font-family: -apple-system, sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 24px; color: #1d1d1f; margin-bottom: 30px; }
        button { background-color: #0066cc; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #0055ab; }
        .result-card { margin-top: 30px; padding: 20px; background-color: #fbfbfd; border: 1px solid #d2d2d7; border-radius: 15px; display: none; text-align: left;}

        /* 데이터를 꾸미기 위한 전용 스타일 */
        .store-badge { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-bottom: 10px;}
        .price-highlight { font-size: 28px; font-weight: 800; color: #d32f2f; margin: 10px 0;}
        .krw-text { font-size: 16px; color: #6e6e73; }
        .rate-info { font-size: 12px; color: #86868b; margin-top: 15px; border-top: 1px solid #e5e5ea; padding-top: 10px;}
    </style>
</head>
<body>
<div class="container">
    <h1>🛒 名古屋スーパー最安値トラッカー</h1>
    <button onclick="fetchLowestPrice()">最安値を確認する</button>

    <!-- 데이터가 꽂힐 빈 공간들 (틀만 잡아둠) -->
    <div id="resultCard" class="result-card">
        <div id="storeName" class="store-badge"></div>
        <div id="priceJpy" class="price-highlight"></div>
        <div id="priceKrw" class="krw-text"></div>
        <div id="rateInfo" class="rate-info"></div>
        <p id="errorMessage" style="color: red; display: none;"></p>
    </div>
</div>

<script>
    function fetchLowestPrice() {
        const card = document.getElementById('resultCard');
        card.style.display = 'block';

        fetch('/api/products/lowest-price')
            .then(response => response.json()) // text()가 아니라 json()으로 파싱!
            .then(data => {
                if (data.success) {
                    // 백엔드에서 받은 JSON 데이터를 HTML 요소 각각에 꽂아 넣음 (Data Binding)
                    document.getElementById('errorMessage').style.display = 'none';
                    document.getElementById('storeName').innerText = `🏪 ${data.storeName}`;
                    document.getElementById('priceJpy').innerText = `¥ ${data.priceJpy}`;
                    document.getElementById('priceKrw').innerText = `(約 ${data.priceKrw} ウォン)`;
                    document.getElementById('rateInfo').innerText = `現在のレート: 1円 = ${data.exchangeRate}ウォン`;
                } else {
                    // 실패 시 에러 메시지 처리
                    document.getElementById('errorMessage').innerText = data.message;
                    document.getElementById('errorMessage').style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
</script>
</body>
</html>
