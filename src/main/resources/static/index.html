<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>名古屋リアルタイムスーパー最安値トラッカー</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-950 to-slate-900 flex flex-col items-center justify-center p-6 font-sans">

  <!-- Header -->
  <header class="mb-10 text-center">
    <div class="flex items-center justify-center gap-3 mb-2">
      <span class="text-4xl">🛒</span>
      <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">
        名古屋リアルタイムスーパー最安値トラッカー
      </h1>
    </div>
    <p class="text-slate-400 text-sm md:text-base">Nagoya Supermarket Real-time Price Tracker</p>
  </header>

  <!-- Card -->
  <main class="w-full max-w-md">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl shadow-2xl p-8">

      <div class="flex items-center gap-2 mb-6">
        <span class="text-2xl">🍌</span>
        <h2 class="text-lg font-semibold text-slate-300 tracking-wide">本日のバナナ最安値</h2>
      </div>

      <!-- Loading state -->
      <div id="state-loading" class="flex flex-col items-center justify-center py-8 gap-4">
        <div class="w-10 h-10 border-4 border-purple-400 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-slate-400 text-sm">データを読み込んでいます...</p>
      </div>

      <!-- Success state -->
      <div id="state-success" class="hidden">
        <div class="mb-6">
          <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">最安値スーパー</p>
          <p id="store-name" class="text-2xl font-bold text-white"></p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
          <div class="bg-white/5 rounded-2xl p-4">
            <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">円価格</p>
            <p id="price-jpy" class="text-3xl font-extrabold text-yellow-300"></p>
          </div>
          <div class="bg-white/5 rounded-2xl p-4">
            <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">ウォン換算</p>
            <p id="price-krw" class="text-3xl font-extrabold text-emerald-400"></p>
          </div>
        </div>

        <div class="flex items-center justify-between bg-white/5 rounded-xl px-4 py-3">
          <span class="text-xs text-slate-400">適用為替レート</span>
          <span id="exchange-rate" class="text-sm font-semibold text-slate-300"></span>
        </div>

        <div class="mt-4 text-center">
          <p id="last-updated" class="text-xs text-slate-500"></p>
        </div>
      </div>

      <!-- Error state -->
      <div id="state-error" class="hidden flex-col items-center justify-center py-8 gap-3 text-center">
        <span class="text-4xl">⚠️</span>
        <p id="error-message" class="text-red-400 text-sm"></p>
      </div>

    </div>

    <!-- Refresh button -->
    <div class="mt-6 text-center">
      <button
        onclick="loadData()"
        class="px-6 py-2.5 bg-purple-600 hover:bg-purple-500 active:scale-95 transition-all text-white text-sm font-semibold rounded-full shadow-lg"
      >
        更新
      </button>
    </div>
  </main>

  <footer class="mt-12 text-slate-600 text-xs">
    &copy; 2026 Nagoya Price Tracker &middot; データは1分ごとに自動更新されます
  </footer>

  <script>
    async function loadData() {
      showState('loading');
      try {
        const res = await fetch('/api/products/lowest-price');
        if (!res.ok) throw new Error(`サーバーエラー (HTTP ${res.status})`);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || 'データの取得に失敗しました。');
        }

        document.getElementById('store-name').textContent = data.storeName;
        document.getElementById('price-jpy').textContent = `¥${data.priceJpy.toLocaleString()}`;
        document.getElementById('price-krw').textContent = `₩${data.priceKrw.toLocaleString()}`;
        document.getElementById('exchange-rate').textContent = `1円 = ${data.exchangeRate}ウォン`;
        document.getElementById('last-updated').textContent =
          `最終更新: ${new Date().toLocaleTimeString('ja-JP')}`;

        showState('success');
      } catch (err) {
        document.getElementById('error-message').textContent = err.message;
        showState('error');
      }
    }

    function showState(state) {
      ['loading', 'success', 'error'].forEach(s => {
        const el = document.getElementById(`state-${s}`);
        el.classList.toggle('hidden', s !== state);
        if (s === 'error') el.classList.toggle('flex', s === state);
      });
    }

    loadData();
  </script>
</body>
</html>
